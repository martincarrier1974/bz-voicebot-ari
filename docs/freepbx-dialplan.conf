# FreePBX – exemples multi-client pour extensions_custom.conf
#
# Principe:
# - 1 process runtime par client
# - 1 ARI_APP unique par client
# - 1 destination/custom context par client

; ===== Client BZ Telecom =====
[from-voicebot-bz-telecom]
exten => s,1,Answer()
same => n,Stasis(voicebot-bz-telecom)
same => n,Hangup()

; Exemple poste test interne
;[from-internal-custom]
;include => voicebot-bz-telecom-test
;
;[voicebot-bz-telecom-test]
;exten => 8500,1,Goto(from-voicebot-bz-telecom,s,1)

; ===== Client Clinique Alpha =====
[from-voicebot-clinique-alpha]
exten => s,1,Answer()
same => n,Stasis(voicebot-clinique-alpha)
same => n,Hangup()

; Exemple poste test interne
;[from-internal-custom]
;include => voicebot-clinique-alpha-test
;
;[voicebot-clinique-alpha-test]
;exten => 8600,1,Goto(from-voicebot-clinique-alpha,s,1)

# Dans FreePBX:
# 1) créer une Custom Destination par client
#    - BZ Telecom -> from-voicebot-bz-telecom,s,1
#    - Clinique Alpha -> from-voicebot-clinique-alpha,s,1
# 2) rattacher chaque DID/IVR vers la bonne destination
# 3) s'assurer que le process PM2 correspondant tourne avec le même ARI_APP
