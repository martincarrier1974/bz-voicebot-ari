# FreePBX – à inclure dans extensions_custom.conf
# Permet d’envoyer les appels vers le voicebot ARI (Stasis).
#
# 1) Destination personnalisée "VoiceBot ARI" = from-voicebot,s,1
# 2) Contexte [from-voicebot] ci-dessous (Answer → Stasis(voicebot) → Hangup)
# 3) Pour composer 8500 et atteindre le voicebot : ajouter 8500 dans [from-internal-custom]

; --- Contexte appelé par la Custom Destination "VoiceBot ARI" ---
[from-voicebot]
exten => s,1,Answer()
same => n,Stasis(voicebot)
same => n,Hangup()

; --- Optionnel : composer 8500 depuis un poste interne envoie au voicebot ---
; 1) Décommentez le bloc [voicebot-8500] ci-dessous.
; 2) Dans FreePBX : Admin → Custom Extensions → inclure le contexte voicebot-8500
;    (ou dans extensions_custom.conf ajoutez en tête : include => voicebot-8500
;     dans la section [from-internal-custom] si elle existe déjà).
;
;[from-internal-custom]
;include => voicebot-8500
;
;[voicebot-8500]
;exten => 8500,1,Goto(from-voicebot,s,1)
